events {}

http {
    server {
        listen 80;

        client_max_body_size 20M;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }


        location = /health {
            default_type application/json;
            return 200 '{"service":"nginx-gateway","status":"ok"}';
        }

        location = /api/catalog/health {
            rewrite ^ /health break;
            proxy_pass http://catalog-service:8000;
            proxy_set_header Host $host;
        }

        location = /api/order/health {
            rewrite ^ /health break;
            proxy_pass http://order-service:8000;
            proxy_set_header Host $host;
        }

        location /api/ai/ {
            rewrite ^/api/ai/(.*)$ /$1 break;
            proxy_pass http://ai-service:8000;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /api/books {
            rewrite ^ /books break;
            proxy_pass http://catalog-service:8000;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/books/ {
            rewrite ^/api/books/(.*)$ /books/$1 break;
            proxy_pass http://catalog-service:8000;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /api/categories {
            rewrite ^ /api/categories break;
            proxy_pass http://catalog-service:8000;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/categories/ {
            rewrite ^/api/categories/(.*)$ /api/categories/$1 break;
            proxy_pass http://catalog-service:8000;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/orders {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://order-service:8000;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/auth/ {
            rewrite ^/api/auth/(.*)$ /$1 break;
            proxy_pass http://auth-service:8000;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /api/currency {
            rewrite ^ /currency/rates break;
            proxy_pass http://tools-service:8000;
            proxy_set_header Host $host;
        }

        location = /api/weather {
            rewrite ^ /weather/tashkent break;
            proxy_pass http://tools-service:8000;
            proxy_set_header Host $host;
        }

        location /api/tools/ {
            rewrite ^/api/tools/(.*)$ /$1 break;
            proxy_pass http://tools-service:8000;
            proxy_set_header Host $host;
        }

        location / {
            return 200 "KitobHub API Gateway is running\n";
            add_header Content-Type text/plain;
        }
    }
}
