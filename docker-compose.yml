services:
  catalog-service:
    build:
      context: ./services/catalog-service
    container_name: kitobhub-catalog-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kitobhub-network

  postgres:
    image: postgres:16
    container_name: kitobhub-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kitobhub-network

  redis:
    image: redis:7-alpine
    container_name: kitobhub-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kitobhub-network

  kafka:
    image: apache/kafka:3.9.1
    container_name: kitobhub-kafka
    hostname: kafka
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - kitobhub-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kitobhub-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: kitobhub-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kitobhub-network

  order-service:
    build:
      context: ./services/order-service
    container_name: kitobhub-order-service
    env_file:
      - .env
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kitobhub-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


  notification-worker:
    build:
      context: ./workers/notification-worker
    container_name: kitobhub-notification-worker
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kitobhub-network



  tools-service:
    build:
      context: ./services/tools-service
    container_name: kitobhub-tools-service
    ports:
      - "8003:8000"
    networks:
      - kitobhub-network

  nginx-gateway:
    image: nginx:1.27-alpine
    container_name: kitobhub-nginx-gateway
    ports:
      - "8088:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      catalog-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    networks:
      - kitobhub-network


  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8088/api
    container_name: kitobhub-frontend
    ports:
      - "3000:80"
    depends_on:
      nginx-gateway:
        condition: service_started
    networks:
      - kitobhub-network


volumes:
  postgres_data:
  redis_data:
  kafka_data:

networks:
  kitobhub-network:
    driver: bridge
