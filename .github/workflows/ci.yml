name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Start Docker Compose stack
        run: |
          docker compose up -d --build
          sleep 30
          docker compose ps

      - name: Run database migrations
        run: |
          docker compose exec -T catalog-service alembic upgrade head
          docker compose exec -T order-service alembic upgrade head

      - name: Ensure Kafka topic exists
        run: |
          docker exec kitobhub-kafka /opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server kafka:9092 \
            --create \
            --if-not-exists \
            --topic order.created \
            --partitions 1 \
            --replication-factor 1

      - name: Run integration tests
        run: |
          pytest

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --tail=200

      - name: Stop Docker Compose stack
        if: always()
        run: |
          docker compose down
